[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
stdout_logfile=/var/log/nginx/stdout.log
stderr_logfile=/var/log/nginx/stderr.log

[program:php-fpm]
command=php-fpm -F
autostart=true
autorestart=true
stdout_logfile=/var/log/php/fpm.log
stderr_logfile=/var/log/php/fpm-error.log

[program:cron]
command=crond -f -l 2
autostart=true
autorestart=true
stdout_logfile=/var/log/cron.log
stderr_logfile=/var/log/cron-error.log

[program:scheduler]
command=php /var/www/html/scheduler/tasks.php
autostart=true
autorestart=true
startsecs=60
startretries=3
stdout_logfile=/var/log/scheduler.log
stderr_logfile=/var/log/scheduler-error.log
