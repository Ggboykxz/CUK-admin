server {
    listen 80;
    server_name cuk-admin.local;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name cuk-admin.local;

    ssl_certificate /etc/ssl/certs/cuk-admin.crt;
    ssl_certificate_key /etc/ssl/private/cuk-admin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /var/www/html;
    index index.php;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1000;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass php-fpm:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        include fastcgi_params;
        fastcgi_param APP_ENV production;
        fastcgi_param REDIS_HOST redis;
        fastcgi_param REDIS_PORT 6379;
        fastcgi_read_timeout 120;
    }

    location /api/ {
        try_files $uri $uri/ /api/rest.php?$query_string;
        location ~ \.php$ {
            fastcgi_pass php-fpm:9000;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
        }
    }

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /uploads/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location ~ /\. {
        deny all;
    }

    location ~ \.(sqlite|sql|md|env|log)$ {
        deny all;
    }

    access_log /var/log/nginx/cuk-admin-access.log;
    error_log /var/log/nginx/cuk-admin-error.log;
}
